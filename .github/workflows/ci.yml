name: CI

on:
  pull_request:
    branches: ['main']

# push builds are intentionally disabled; allow manual workflow dispatch if needed
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/bun@v1
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun test
