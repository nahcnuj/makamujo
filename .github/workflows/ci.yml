name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './bin'

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - { script: test, label: unit }
          - { script: test:integration, label: integration }
    name: test (${{ matrix.suite.label }})
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Run tests
        run: bun run ${{ matrix.suite.script }}
