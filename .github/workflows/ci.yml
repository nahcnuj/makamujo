name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './bin'

  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node_modules/

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      matrix:
        suite:
          - { script: test, label: unit }
          - { script: test:integration, label: integration }
          - { script: test:e2e, label: e2e }
    name: test (${{ matrix.suite.label }})
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules
          path: node_modules/
      - name: Allow binding to port 443 without root
        if: matrix.suite.label == 'e2e'
        run: sudo sysctl -w net.ipv4.ip_unprivileged_port_start=443
      - name: Run ${{ matrix.suite.label }} tests
        run: bun run ${{ matrix.suite.script }}
