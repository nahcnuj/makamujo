name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './bin'

  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Restore node_modules from cache (if available)
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Restore Playwright browsers cache (if available)
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun ci
      - name: Save node_modules to cache
        uses: actions/cache/save@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Restore node_modules from cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          fail-on-cache-miss: true
      - name: Run tsc --noEmit
        run: bun run typecheck

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      matrix:
        suite:
          - { script: test, label: unit }
          - { script: test:integration, label: integration }
          - { script: test:bin, label: bin }
          - { script: test:e2e, label: e2e }
    name: test (${{ matrix.suite.label }})
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Restore node_modules from cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Restore Playwright browsers cache (if available)
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
      - name: Allow binding to port 443 without root
        if: matrix.suite.label == 'e2e'
        run: sudo sysctl -w net.ipv4.ip_unprivileged_port_start=443
      - name: Run ${{ matrix.suite.label }} tests
        run: bun run ${{ matrix.suite.script }}
      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
