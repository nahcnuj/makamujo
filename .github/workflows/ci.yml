name: CI

on:
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Checkout dependency library
        run: |
          git clone https://github.com/nahcnuj/automated-gameplay-transmitter.git ../automated-gameplay-transmitter
          (cd ../automated-gameplay-transmitter && bun link)
      - name: Install dependencies
        run: |
          bun install
          bun link automated-gameplay-transmitter
      - name: Run tests
        run: bun test
