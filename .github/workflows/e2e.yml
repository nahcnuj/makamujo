name: E2E

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Run E2E tests
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if timeout 3m bash -c 'bunx playwright install --with-deps chromium && bun run test:e2e'; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "E2E tests failed on attempt $attempt. Retrying..."
            fi
          done

          echo "E2E tests failed after 3 attempts."
          exit 1
