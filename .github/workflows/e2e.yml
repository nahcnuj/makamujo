name: E2E

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Allow binding to port 443 without root
        run: sudo sysctl -w net.ipv4.ip_unprivileged_port_start=443
      - name: Generate self-signed TLS cert for console E2E tests
        run: |
          mkdir -p /tmp/certs
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/certs/key.pem -out /tmp/certs/cert.pem -days 7 -nodes -subj '/CN=localhost'
          echo "CONSOLE_TLS_CERT=/tmp/certs/cert.pem" >> $GITHUB_ENV
          echo "CONSOLE_TLS_KEY=/tmp/certs/key.pem" >> $GITHUB_ENV
      - name: Run E2E tests
        run: bun run test:e2e
