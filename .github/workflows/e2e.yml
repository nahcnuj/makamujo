name: E2E

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests (1/3)
        id: e2e-1
        continue-on-error: true
        timeout-minutes: 3
        run: bunx playwright test tests/e2e --timeout=60000
      - name: Run E2E tests (2/3)
        id: e2e-2
        if: steps.e2e-1.outcome != 'success'
        continue-on-error: true
        timeout-minutes: 3
        run: bunx playwright test tests/e2e --timeout=60000
      - name: Run E2E tests (3/3)
        if: steps.e2e-1.outcome != 'success' && steps.e2e-2.outcome != 'success'
        timeout-minutes: 3
        run: bunx playwright test tests/e2e --timeout=60000
