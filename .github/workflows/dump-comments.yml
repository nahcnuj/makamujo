name: Dump Comments

on:
  push:
    branches:
      - feat/port-main-ops-onto-legacy

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run comment dump
        run: bun run print-comments
        env:
          NICONAMA_PRINT_DURATION_MS: "10000"
